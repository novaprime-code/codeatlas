name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature] "
labels: ["type:story"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
  - type: dropdown
    id: package
    attributes:
      label: Related Package
      options:
        - codeatlas/contracts
        - codeatlas/core
        - codeatlas/scanner
        - codeatlas/laravel
        - Analyzer (specify in description)
        - Exporter (specify in description)
        - "@codeatlas/ui"
        - "@codeatlas/desktop"
        - New package needed
        - Not sure
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, references, or anything else
